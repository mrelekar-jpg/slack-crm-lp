<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slack - Sign in</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; min-height: 100vh; display: flex; flex-direction: column; }

        .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 24px; }
        .signin-box { max-width: 440px; width: 100%; text-align: center; }

        .logo-area { margin-bottom: 40px; }
        .logo-area .slack-logo { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 4px; }
        .logo-area .slack-logo svg { width: 28px; height: 28px; }
        .logo-area .slack-logo span { font-size: 26px; font-weight: 700; color: #1d1c1d; letter-spacing: -0.5px; }
        .logo-area .from-sf { font-size: 11px; color: #616061; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .logo-area .from-sf svg { width: 12px; height: 12px; }

        .signin-box h1 { font-size: 32px; font-weight: 700; color: #1d1c1d; margin-bottom: 10px; }
        .signin-box .hint { font-size: 15px; color: #454245; margin-bottom: 28px; }
        .signin-box .hint strong { font-weight: 700; }

        .input-group { margin-bottom: 16px; text-align: left; }
        .input-group input { width: 100%; padding: 14px 16px; border: 1px solid #bababa; border-radius: 4px; font-size: 18px; color: #1d1c1d; }
        .input-group input:focus { outline: none; border-color: #1264a3; box-shadow: 0 0 0 1px #1264a3; }

        .btn-continue { width: 100%; background: #611f69; color: white; padding: 16px; border: none; border-radius: 4px; font-size: 18px; font-weight: 700; cursor: pointer; margin-bottom: 24px; }
        .btn-continue:hover { background: #4a154b; }

        .divider-line { display: flex; align-items: center; gap: 16px; margin: 20px 0; }
        .divider-line::before, .divider-line::after { content: ''; flex: 1; border-top: 1px solid #ddd; }
        .divider-line span { font-size: 14px; color: #616061; font-weight: 500; }

        .sso-buttons { display: flex; gap: 12px; margin-bottom: 32px; }
        .sso-btn { display: flex; align-items: center; justify-content: center; gap: 8px; flex: 1; padding: 12px 16px; border: 2px solid #ddd; border-radius: 4px; font-size: 16px; font-weight: 600; color: #1d1c1d; cursor: pointer; background: white; text-decoration: none; }
        .sso-btn:hover { background: #f8f8f8; border-color: #999; }
        .sso-btn svg { width: 20px; height: 20px; }

        .existing-user { font-size: 15px; color: #454245; }
        .existing-user a { color: #1264a3; font-weight: 400; text-decoration: none; }
        .existing-user a:hover { text-decoration: underline; }

        .bottom-bar { padding: 24px 32px; border-top: 1px solid #e8e8e8; display: flex; justify-content: center; gap: 20px; font-size: 13px; align-items: center; }
        .bottom-bar a { color: #616061; text-decoration: none; }
        .bottom-bar .region { display: flex; align-items: center; gap: 4px; }
    </style>
</head>
<body>

<div class="main">
    <div class="signin-box">

        <!-- Slack Logo -->
        <div class="logo-area">
            <div class="slack-logo">
                <svg viewBox="0 0 54 54" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19.712.133a4.514 4.514 0 0 0-4.503 4.525 4.514 4.514 0 0 0 4.503 4.525h4.503V4.658A4.514 4.514 0 0 0 19.712.133m0 12.05H4.503A4.514 4.514 0 0 0 0 16.708a4.514 4.514 0 0 0 4.503 4.525h15.21a4.514 4.514 0 0 0 4.502-4.525 4.514 4.514 0 0 0-4.503-4.525" fill="#36C5F0"/>
                    <path d="M53.871 16.708a4.514 4.514 0 0 0-4.503-4.525 4.514 4.514 0 0 0-4.503 4.525v4.525h4.503a4.514 4.514 0 0 0 4.503-4.525m-12.052 0V4.658A4.514 4.514 0 0 0 37.316.133a4.514 4.514 0 0 0-4.503 4.525v12.05a4.514 4.514 0 0 0 4.503 4.525 4.514 4.514 0 0 0 4.503-4.525" fill="#2EB67D"/>
                    <path d="M37.316 54a4.514 4.514 0 0 0 4.503-4.525 4.514 4.514 0 0 0-4.503-4.525h-4.503v4.525A4.514 4.514 0 0 0 37.316 54m0-12.05h15.21a4.514 4.514 0 0 0 4.503-4.525 4.514 4.514 0 0 0-4.503-4.525h-15.21a4.514 4.514 0 0 0-4.503 4.525 4.514 4.514 0 0 0 4.503 4.525" fill="#ECB22E"/>
                    <path d="M.157 37.425a4.514 4.514 0 0 0 4.503 4.525 4.514 4.514 0 0 0 4.503-4.525v-4.525H4.66a4.514 4.514 0 0 0-4.503 4.525m12.052 0v12.05A4.514 4.514 0 0 0 16.712 54a4.514 4.514 0 0 0 4.503-4.525v-12.05a4.514 4.514 0 0 0-4.503-4.525 4.514 4.514 0 0 0-4.503 4.525" fill="#E01E5A"/>
                </svg>
                <span>slack</span>
            </div>
            <div class="from-sf">
                from
                <svg viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
                    <path d="M83 27c5.7-6 13.6-9.6 22.4-9.6 11 0 20.8 5.8 26.2 14.6 4.7-2.1 9.9-3.3 15.4-3.3 20.9 0 37.8 17 37.8 37.9s-16.9 37.9-37.8 37.9c-2.8 0-5.5-.3-8.1-.9-4.7 8.4-13.6 14-23.8 14-4.5 0-8.7-1.1-12.4-3-5 10.8-15.9 18.3-28.5 18.3-12.2 0-22.8-7-28-17.3-2.4.6-5 .9-7.6.9C19.9 116.5 4.7 101.3 4.7 82.5c0-12.4 6.7-23.3 16.6-29.3-1.5-3.9-2.4-8.2-2.4-12.7C18.9 21.1 34.6 5.3 54 5.3c11.8 0 22.2 5.8 28.9 14.6z" fill="#00A1E0"/>
                </svg>
                Salesforce
            </div>
        </div>

        <h1>First, enter your email</h1>
        <p class="hint">We suggest using the <strong>email address you use at work.</strong></p>

        <div class="input-group">
            <input type="email" placeholder="name@work-email.com" value="zoem@lunalabs.com">
        </div>

        <button class="btn-continue">Continue</button>

        <div class="divider-line">
            <span>OR</span>
        </div>

        <div class="sso-buttons">
            <a href="#" class="sso-btn">
                <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
            </a>
            <a href="#" class="sso-btn">
                <svg viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" fill="#000"/></svg>
                Apple
            </a>
        </div>

        <p class="existing-user">
            Already using Slack? <a href="#">Sign in to an existing workspace</a>
        </p>
    </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
    <a href="#">Privacy & Terms</a>
    <a href="#">Contact Us</a>
    <a href="#" class="region">&#x1F310; Change region &#x25BE;</a>
</div>

</body>
</html>
